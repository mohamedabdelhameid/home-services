<section class="bg-indigo-50">
  <div class="max-w-7xl mx-auto px-4 py-16">

    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold text-gray-900 mb-2">What Our Customers Say</h2>
      <p class="text-gray-500 text-sm">Quality service backed by thousands of happy homeowners.</p>
    </div>

    <owl-carousel-o [options]="customOptions">
      @for (item of testimonials; track item.name) {
        <ng-template carouselSlide>
          <div class="bg-white rounded-xl border border-gray-200 p-6 h-full flex flex-col">

            <div class="flex gap-1 mb-4 text-amber-400">
              @for (star of [1, 2, 3, 4, 5]; track star) {
                <i class="fa-solid fa-star text-sm" [class.text-gray-200]="star > item.rating"></i>
              }
            </div>

            <p class="text-sm text-gray-600 italic leading-6 mb-6 flex-1">
              "{{ item.quote }}"
            </p>

            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full flex items-center justify-center text-white text-xs font-semibold"
                [class]="item.color">
                {{ item.initials }}
              </div>
              <div>
                <p class="text-sm font-semibold text-gray-900">{{ item.name }}</p>
                <p class="text-xs text-blue-600">{{ item.role }}</p>
              </div>
            </div>

          </div>
        </ng-template>
      }
    </owl-carousel-o>

  </div>
</section>
