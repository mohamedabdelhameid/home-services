<section class="bg-white pt-10">
  <div class="max-w-7xl mx-auto px-4 py-16 md:py-24">
    <div class="grid md:grid-cols-2 gap-12 items-center">

      <div class="order-2 md:order-1">
        <span class="inline-block bg-indigo-100 text-indigo-700 text-xs font-medium px-3 py-1.5 rounded-full mb-5">
          Trusted by 50,000+ Homeowners
        </span>

        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 leading-tight mb-5">
          All Your Home Services<br class="hidden md:block">
          in One Place
        </h1>

        <p class="text-gray-500 text-base leading-7 mb-8 max-w-md">
          Experience the gold standard of home care. From deep cleaning to
          expert repairs, we connect you with verified professionals who
          treat your home like their own.
        </p>

        <div class="flex flex-wrap items-center gap-3">
          <button type="button"
            class="inline-flex cursor-pointer items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-3 rounded-lg transition-colors">
            Book a Service
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </button>

          <button type="button"
            class="inline-flex cursor-pointer items-center gap-2 bg-white hover:bg-gray-50 text-gray-700 text-sm font-medium px-5 py-3 rounded-lg border border-gray-300 transition-colors">
            Explore Services
          </button>
        </div>
      </div>

      <div class="relative order-1 md:order-2">
        <div class="bg-indigo-50 rounded-2xl overflow-hidden">
          <img [src]="imageUrl" alt="Home services team" class="w-full h-auto object-cover">
        </div>
      </div>

    </div>
  </div>
</section>
